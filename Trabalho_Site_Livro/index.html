<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Receitas do Chico Bento</title>
<link rel="shortcut icon" href="img/imagemsite.jpg" type="image/x-icon">

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    overflow-x:hidden;
    cursor:none;
    /* Fundo de imagem da pasta local */
    background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('img/madeira.png');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    min-height: 100vh;
}

/* Animação usada no Botão */
@keyframes fundoAnimado{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.menu{
    /* ALTERAÇÃO: Apenas a cor do fundo é transparente (0.4), os itens dentro ficam normais */
    background: none; 
    height:90px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:40px;
    color:#ffffff; 
    font-size:18px;
    position:relative;
    z-index:100;
    font-weight: bold;
    backdrop-filter: blur(5px); /* Mantive o desfoque para dar leitura ao texto */
}

.menu p{
    cursor:none;
    transition:0.3s;
    padding: 10px;
}

.menu p:hover{
    transform:scale(1.2);
    color:rgb(255, 242, 0);
}

#chico{
    width:57px;
    position:absolute;
    top:10px;
    left:0;
    transition: opacity 0.3s, transform 0.3s;
}

h1{
    text-align:center;
    color:#ffffff;
    margin-top:30px;
    z-index:10;
    position:relative;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
}

#chapeu-inicial {
    width: 200px;
    display: block;
    margin: 20px auto;
    transition: 0.8s ease-in-out;
    z-index: 5;
    position: relative;
}

.chapeu-sumiu {
    opacity: 0;
    transform: translateY(-100px) scale(0.5);
    pointer-events: none;
}

#gemini-ajudante {
    position: fixed;
    bottom: 20px;
    left: calc(100% - 90px);
    width: 70px;
    z-index: 1000;
    transition: left 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55), transform 0.3s;
    animation: flutuar 3s ease-in-out infinite;
}

@keyframes flutuar {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
}

button{
    display:block;
    margin:20px auto;
    padding:15px 30px;
    font-size:18px;
    background: linear-gradient(-45deg,#ffe94d,#ffd43b,#2a94c2,#ffe94d);
    background-size:400% 400%;
    animation:fundoAnimado 10s ease infinite;
    color:#003146;
    font-weight: bold;
    border: 2px solid #003146;
    border-radius:10px;
    cursor:none;
    transition:0.3s;
    position: relative;
    z-index: 20;
}

button:hover{
    transform:scale(1.1);
    box-shadow: 0px 0px 15px yellow;
}

.receitas{
    display:flex;
    justify-content:center;
    gap:40px;
    flex-wrap:wrap;
    opacity:0;
    transform:translateY(50px);
    transition:1s;
    padding:20px;
    z-index:10;
    position:relative;
    display: none; 
}

.receitas.ativo{
    display: flex;
    opacity:1;
    transform:translateY(0);
}

.card{
    text-align:center;
    background:rgba(255,255,255,0.7);
    padding:10px;
    border-radius:15px;
    transition: 0.3s;
}

.card img{
    width:320px;
    height:220px;
    border-radius:12px;
    box-shadow:0px 5px 15px rgba(0,0,0,0.3);
    transition:0.4s;
    cursor:none;
}

.card img:hover{
    transform:scale(1.05);
}

#fork-cursor {
    position: fixed;
    pointer-events: none;
    font-size: 40px;
    z-index: 9999; 
    transform: translate(-50%, -50%);
    transition: transform 0.05s ease-out;
}

.cesta-container {
    position: absolute; 
    top: 130px; 
    right: 20px; 
    width: 150px;
    height: 120px;
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: center;
}

.cesta-visual {
    font-size: 80px; 
    position: absolute;
    bottom: 0;
    filter: drop-shadow(0 5px 10px rgba(0,0,0,0.2));
    z-index: 52;
}

.food-item {
    position: absolute; 
    font-size: 25px;
    z-index: 51; 
    user-select: none;
    transition: transform 0.5s, opacity 0.5s;
}

.eaten {
    transform: scale(0) rotate(180deg);
    opacity: 0;
}

.modal{
    display:none;
    position:fixed;
    z-index:2000;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    align-items:center;
    justify-content:center;
}

.modal-content{
    background:#fff8d6;
    padding:25px;
    width:500px;
    border-radius:15px;
    text-align:center;
    animation:aparecer 0.5s;
    max-height: 80vh;
    overflow-y: auto;
    position: relative;
}

@keyframes aparecer{
    from{transform:scale(0.5);opacity:0;}
    to{transform:scale(1);opacity:1;}
}

.fechar{
    position:absolute;
    top:10px;
    right:15px;
    font-size:30px;
    color:#003146;
    cursor:none;
}
</style>
</head>

<body>

<div id="fork-cursor">🍴</div>

<img id="gemini-ajudante" src="img/dica.png" onclick="fugir()">

<div class="cesta-container" id="cesta">
    <div class="cesta-visual">🧺</div>
</div>

<div class="menu">
    <img id="chico" src="img/Chico_bento.webp" onclick="comerChico()" style="cursor:none;">
    <p onclick="mostrarSobre()">Sobre</p>
    <p onclick="filtrar('salgado')">Salgados</p>
    <p onclick="filtrar('doce')">Doces</p>
    <p onclick="mostrarContato()">Contato</p>
</div>

<h1>Receitas da Roça do Chico Bento</h1>

<button id="btn-central" onclick="mostrarReceitas()">Ver Todas as Receitas</button>
<img id="chapeu-inicial" src="img/chapeuinicial.png">

<div class="receitas" id="receitas">
    <div class="card salgado"><img src="img/salgado1.jpg" onclick="abrirReceita('vaca')"><p>Vaca Atolada</p></div>
    <div class="card salgado"><img src="img/salgado2.jpg" onclick="abrirReceita('leitoa')"><p>Leitoa Assada</p></div>
    <div class="card salgado"><img src="img/salgado3.jpg" onclick="abrirReceita('canjiquinha')"><p>Canjiquinha com Costelinha</p></div>
    <div class="card doce"><img src="img/doce1.jpg" onclick="abrirReceita('banana')"><p>Doce de Banana</p></div>
    <div class="card doce"><img src="img/doce2.jpg" onclick="abrirReceita('abacaxi')"><p>Doce de Abacaxi</p></div>
    <div class="card doce"><img src="img/doce3.jpg" onclick="abrirReceita('cambuci')"><p>Sorvete de Cambuci</p></div>
</div>

<div id="modalReceita" class="modal">
    <div class="modal-content">
        <span class="fechar" onclick="fecharReceita()">✖</span>
        <h2 id="tituloReceita"></h2>
        <div id="textoReceita" style="text-align: left; line-height: 1.5;"></div>
    </div>
</div>

<script>
let chico = document.getElementById("chico");
let posicao = 0;
let cliquesNoChico = 0;
let estaResetando = false;
let naDireita = true;

function fugir() {
    const gemini = document.getElementById("gemini-ajudante");
    if (naDireita) {
        gemini.style.left = "20px";
        gemini.style.transform = "scaleX(-1)";
    } else {
        gemini.style.left = "calc(100% - 90px)";
        gemini.style.transform = "scaleX(1)";
    }
    naDireita = !naDireita;
}

setInterval(function(){
    if(!estaResetando) {
        posicao += 2;
        if(posicao > window.innerWidth) posicao = -80;
        chico.style.left = posicao + "px";
    }
}, 20);

function comerChico() {
    if (estaResetando) return;
    cliquesNoChico++;
    let vidaRestante = (5 - cliquesNoChico) / 5;
    chico.style.opacity = vidaRestante;
    chico.style.transform = `scale(${0.5 + (vidaRestante * 0.5)})`;

    const fork = document.getElementById('fork-cursor');
    fork.style.transform = 'translate(-50%,-50%) scale(1.5) rotate(-20deg)';
    setTimeout(() => {
        fork.style.transform = 'translate(-50%,-50%) scale(1)';
    }, 150);

    if (cliquesNoChico >= 5) {
        estaResetando = true;
        chico.style.opacity = "0";
        setTimeout(() => {
            cliquesNoChico = 0;
            posicao = -100;
            chico.style.left = posicao + "px";
            chico.style.opacity = "1";
            chico.style.transform = "scale(1)";
            estaResetando = false;
        }, 600);
    }
}

function mostrarReceitas(){
    document.getElementById("chapeu-inicial").classList.add("chapeu-sumiu");
    document.getElementById("btn-central").style.display = "none";

    const container = document.getElementById("receitas");
    container.classList.add("ativo");
    const cards = document.querySelectorAll('.card');
    cards.forEach(card => card.style.display = "block");
}

function filtrar(tipo) {
    mostrarReceitas();
    const cards = document.querySelectorAll('.card');
    cards.forEach(card => {
        card.style.display = card.classList.contains(tipo) ? "block" : "none";
    });
}

function mostrarSobre() {
    abrirModal("Sobre a Nossa Roça", "<p>Uai, sô! Seja muito bem-vindo à cozinha do Chico Bento!</p><p>Aqui as receita são tudo feita com carinho direto do fogão a lenha.</p>");
}

function mostrarContato() {
    abrirModal("Fale com o Chico", "<p>📧 Email: contato@rocadochico.com.br</p><p>📍 Vila Abobrinha, Sítio do Nene.</p>");
}

function abrirModal(titulo, conteudo) {
    const modal = document.getElementById("modalReceita");
    document.getElementById("tituloReceita").innerText = titulo;
    document.getElementById("textoReceita").innerHTML = conteudo;
    modal.style.display = "flex";
}

function abrirReceita(tipo){
    const bancoDeReceitas = {
        vaca: { titulo: "Vaca Atolada", conteudo: "<strong>Ingredientes:</strong><br>• 1kg de costela bovina<br>• 800g de mandioca.<br><br><strong>Preparo:</strong> Cozinhe na pressão por 30min e junte a mandioca." },
        leitoa: { titulo: "Leitoa Assada", conteudo: "<strong>Ingredientes:</strong><br>• 2kg de leitoa.<br><br><strong>Preparo:</strong> Marine por 12h e asse até dourar." },
        canjiquinha: { titulo: "Canjiquinha", conteudo: "<strong>Ingredientes:</strong><br>• 500g de canjiquinha.<br><br><strong>Preparo:</strong> Cozinhe com costelinha de porco." },
        banana: { titulo: "Doce de Banana", conteudo: "<strong>Ingredientes:</strong><br>• Bananas e açúcar.<br><br><strong>Preparo:</strong> Cozinhe até caramelizar." },
        abacaxi: { titulo: "Doce de Abacaxi", conteudo: "<strong>Ingredientes:</strong><br>• Abacaxi e açúcar.<br><br><strong>Preparo:</strong> Cozinhe até reduzir a calda." },
        cambuci: { titulo: "Sorvete de Cambuci", conteudo: "<strong>Ingredientes:</strong><br>• Cambucis e leite condensado.<br><br><strong>Preparo:</strong> Bata e congele." }
    };
    if(bancoDeReceitas[tipo]) abrirModal(bancoDeReceitas[tipo].titulo, bancoDeReceitas[tipo].conteudo);
}

function fecharReceita(){
    document.getElementById("modalReceita").style.display="none";
}

const fork = document.getElementById('fork-cursor');
document.addEventListener("mousemove", function(e){
    fork.style.left = e.clientX + "px";
    fork.style.top = e.clientY + "px";

    const foods = document.querySelectorAll('.food-item:not(.eaten)');
    foods.forEach(food => {
        const rect = food.getBoundingClientRect();
        const dist = Math.hypot(e.clientX - (rect.left + 15), e.clientY - (rect.top + 15));
        if(dist < 30){
            food.classList.add('eaten');
            setTimeout(() => {
                food.remove();
                createFood();
            }, 200);
        }
    });
});

const foodEmojis=['🌽','🍗','🍎','🍉','🍳','🍰','🍞','🧀'];
const cesta = document.getElementById('cesta');

function createFood(){
    const food = document.createElement('div');
    food.className = 'food-item';
    food.innerText = foodEmojis[Math.floor(Math.random() * foodEmojis.length)];
    food.style.left = (Math.random() * 80 + 30) + 'px'; 
    food.style.top = (Math.random() * 40 + 10) + 'px';
    cesta.appendChild(food);
}

for(let i=0; i<10; i++) createFood();
</script>

</body>
</html>
